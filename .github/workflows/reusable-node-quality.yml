name: Reusable Node Quality
run-name: Node ${{ inputs.node-version }} Quality Checks

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        default: "20"
        type: string

permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  tests:
    name: Tests with Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  e2e:
    name: E2E Tests with Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  github-pages:
    name: Deploy to GitHub Pages
    needs: tests
    uses: ./.github/workflows/deploy-pages.yml
    with:
      node-version: "24"
    permissions:
      contents: read
      pages: write
      id-token: write
  comment:
    name: Comment on PR
    if: always()
    needs: github-pages
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment with Pages URL
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            | Item | Link |
            | --- | --- |
            | 🌐 GitHub Pages URL | ${{ needs.github-pages.outputs.page_url }} |
            | 🧾 Workflow logs | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |
